version: 2.1

orbs:
  macos: circleci/macos@2

jobs:
  build-and-release:
    macos:
      xcode: "26.2.0"
    resource_class: m4pro.medium
    environment:
      SCHEME: Airtype
      PROJECT: Airtype.xcodeproj
      ARCHIVE_PATH: build/Airtype.xcarchive
      EXPORT_PATH: build/export
    steps:
      - checkout

      # Install certificate and provisioning profile
      - run:
          name: Install signing certificate
          command: |
            KEYCHAIN_PASSWORD="ci-build-$$"
            KEYCHAIN_PATH="$HOME/Library/Keychains/build.keychain-db"
            # Create keychain with non-empty password and long timeout
            security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            # Import signing certificate with -A flag (allow all apps)
            echo "$CERTIFICATE_P12_BASE64" | base64 --decode > /tmp/certificate.p12
            security import /tmp/certificate.p12 -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
            # Install Apple root and intermediate certificates for full chain
            curl -sO https://www.apple.com/appleca/AppleIncRootCertificate.cer
            curl -sO https://www.apple.com/certificateauthority/AppleRootCA-G2.cer
            curl -sO https://www.apple.com/certificateauthority/DeveloperIDCA.cer
            curl -sO https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer
            security import AppleIncRootCertificate.cer -k "$KEYCHAIN_PATH"
            security import AppleRootCA-G2.cer -k "$KEYCHAIN_PATH"
            security import DeveloperIDCA.cer -k "$KEYCHAIN_PATH"
            security import DeveloperIDG2CA.cer -k "$KEYCHAIN_PATH"
            rm -f AppleIncRootCertificate.cer AppleRootCA-G2.cer DeveloperIDCA.cer DeveloperIDG2CA.cer /tmp/certificate.p12
            # Set partition list and keychain search order
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            security list-keychains -d user -s "$KEYCHAIN_PATH"
            # Verify
            security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      # Set version from git tag
      - run:
          name: Set version from tag
          command: |
            VERSION="${CIRCLE_TAG#v}"
            /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" Info.plist
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VERSION" Info.plist

      # Resolve SPM dependencies
      - run:
          name: Resolve packages
          command: xcodebuild -resolvePackageDependencies -project "$PROJECT" -scheme "$SCHEME"

      # Build archive
      - run:
          name: Archive
          command: |
            xcodebuild archive \
              -project "$PROJECT" \
              -scheme "$SCHEME" \
              -configuration Release \
              -archivePath "$ARCHIVE_PATH" \
              OTHER_CODE_SIGN_FLAGS="--keychain $HOME/Library/Keychains/build.keychain-db"

      # Export
      - run:
          name: Export app
          command: |
            mkdir -p build
            printf '<?xml version="1.0" encoding="UTF-8"?>\n<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">\n<plist version="1.0">\n<dict>\n<key>method</key>\n<string>developer-id</string>\n<key>teamID</key>\n<string>%s</string>\n</dict>\n</plist>\n' "$TEAM_ID" > build/ExportOptions.plist
            xcodebuild -exportArchive \
              -archivePath "$ARCHIVE_PATH" \
              -exportPath "$EXPORT_PATH" \
              -exportOptionsPlist build/ExportOptions.plist

      # Notarize
      - run:
          name: Notarize app
          command: |
            cd "$EXPORT_PATH"
            ditto -c -k --keepParent Airtype.app Airtype.zip
            xcrun notarytool submit Airtype.zip \
              --apple-id "$APPLE_ID" \
              --password "$APP_SPECIFIC_PASSWORD" \
              --team-id "$TEAM_ID" \
              --wait
            xcrun stapler staple Airtype.app

      # Create DMG with Applications symlink
      - run:
          name: Create DMG
          command: |
            DMG_DIR="build/dmg-staging"
            mkdir -p "$DMG_DIR"
            cp -R "$EXPORT_PATH/Airtype.app" "$DMG_DIR/"
            ln -s /Applications "$DMG_DIR/Applications"
            hdiutil create -volname "Airtype" \
              -srcfolder "$DMG_DIR" \
              -ov -format UDZO \
              "build/Airtype-${CIRCLE_TAG:-dev}.dmg"
            rm -rf "$DMG_DIR"

      # Store artifact (copy to fixed name for CircleCI artifact storage)
      - run:
          name: Prepare artifact
          command: cp "build/Airtype-${CIRCLE_TAG:-dev}.dmg" build/Airtype.dmg
      - store_artifacts:
          path: build/Airtype.dmg

      # Upload to Cloudflare R2 (only on tags)
      - when:
          condition: \<< pipeline.git.tag >>
          steps:
            - run:
                name: Upload to Cloudflare R2
                command: |
                  pip3 install awscli
                  DMG="build/Airtype-${CIRCLE_TAG}.dmg"
                  # Upload versioned file
                  aws s3 cp "$DMG" \
                    "s3://${R2_BUCKET}/releases/Airtype-${CIRCLE_TAG}.dmg" \
                    --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
                  # Update latest pointer
                  aws s3 cp "$DMG" \
                    "s3://${R2_BUCKET}/releases/Airtype-latest.dmg" \
                    --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
                  # Publish version metadata
                  echo "{\"version\":\"${CIRCLE_TAG}\",\"date\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > build/version.json
                  aws s3 cp build/version.json \
                    "s3://${R2_BUCKET}/releases/version.json" \
                    --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" \
                    --content-type "application/json"

workflows:
  build:
    jobs:
      - build-and-release:
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
